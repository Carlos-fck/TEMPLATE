{# Top bar above the page content. Keep it lightweight — the sidebar is the
   primary navigation surface. #}
<header class="topbar">
  <button type="button" class="topbar-toggle" data-sidebar-toggle
          aria-label="Alternar menu lateral">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
         stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 6h18M3 12h18M3 18h18"/>
    </svg>
  </button>
  <div class="topbar-spacer"></div>
  {% if user %}
    <div class="topbar-user">
      <span class="topbar-user-name">{{ user.display_name }}</span>
      <span class="topbar-user-avatar" aria-hidden="true">
        {{ user.display_name[:1] | upper }}
      </span>
    </div>
  {% endif %}
</header>
